<div class="page-spacing">
  <section
    class="kitty-scene"
    aria-label="Animated Hello Kitty character">
    <div class="kitty-glow"></div>

    <div
      class="kitty"
      role="img"
      aria-label="Hello Kitty waving hello">
      <div class="kitty-ear kitty-ear-left"></div>
      <div class="kitty-ear kitty-ear-right"></div>

      <div class="kitty-head">
        <div class="kitty-bow">
          <span class="bow-loop bow-loop-left"></span>
          <span class="bow-loop bow-loop-right"></span>
          <span class="bow-knot"></span>
        </div>

        <div class="kitty-eye kitty-eye-left"></div>
        <div class="kitty-eye kitty-eye-right"></div>
        <div class="kitty-nose"></div>

        <div class="whiskers whiskers-left">
          <span></span>
          <span></span>
          <span></span>
        </div>
        <div class="whiskers whiskers-right">
          <span></span>
          <span></span>
          <span></span>
        </div>
      </div>

      <div class="kitty-body">
        <div class="kitty-arm kitty-arm-left"></div>
        <div class="kitty-arm kitty-arm-right"></div>
        <div class="kitty-leg kitty-leg-left"></div>
        <div class="kitty-leg kitty-leg-right"></div>
      </div>
    </div>

    <p class="kitty-caption">Hello from Kitty</p>
  </section>
</div>
