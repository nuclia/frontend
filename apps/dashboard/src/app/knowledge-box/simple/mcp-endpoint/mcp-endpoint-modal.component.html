<pa-modal-dialog>
  <pa-modal-title>
    {{ 'simple.mcp.title' | translate }}
  </pa-modal-title>
  <pa-modal-description>
    {{ 'simple.mcp.description' | translate }}
  </pa-modal-description>

  <pa-modal-content>
    <div
      class="endpoint"
      role="region"
      [attr.aria-label]="'simple.mcp.endpoint.label' | translate">
      <pre><code>{{ endpoint | async }}</code></pre>
      <pa-button
        aspect="basic"
        iconAndText
        [icon]="copied() ? 'check' : 'copy'"
        (click)="copyEndpoint()">
        {{ (copied() ? 'generic.copied' : 'generic.copy') | translate }}
      </pa-button>
    </div>
    <div class="how-to">
      <a
        href="https://medium.com/nuclia/connecting-your-contentbox-5045f56f7ade"
        target="_blank"
        rel="noopener noreferrer">
        {{ 'simple.mcp.how-to' | translate }}
        <span class="sr-only">({{ 'generic.opens-in-new-tab' | translate }})</span>
      </a>
    </div>
  </pa-modal-content>
</pa-modal-dialog>
