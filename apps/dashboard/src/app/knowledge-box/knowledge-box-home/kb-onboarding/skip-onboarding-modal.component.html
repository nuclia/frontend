<pa-modal-dialog>
  <pa-modal-title>{{ 'onboarding.skip-modal.title' | translate }}</pa-modal-title>
  <pa-modal-content>
    <p>{{ 'onboarding.skip-modal.body' | translate }}</p>
  </pa-modal-content>
  <pa-modal-footer>
    <pa-button
      kind="primary"
      (click)="confirmSkip()">
      {{ 'onboarding.skip-modal.confirm' | translate }}
    </pa-button>
    <pa-button
      aspect="basic"
      (click)="modal.close()">
      {{ 'onboarding.skip-modal.cancel' | translate }}
    </pa-button>
  </pa-modal-footer>
</pa-modal-dialog>
