# Chat Advice — Dashboard Page Registry
#
# Navigation document for the chat advice widget.
# Injected as extra_context in every /kb/ask request.
#
# MAINTENANCE: Update when routes change.
# Staleness check: find apps/dashboard/src/app -name "*routing*" -newer apps/dashboard/src/assets/chat/pages.yaml
#
# Route params (:account, :zone, :kb, :agent) are resolved at runtime by ChatAdviceService.

pages:
  - id: account-home
    route: "/at/:account/manage/home"
    title: "Consumption"
    summary: "This route shows account consumption and Knowledge Box totals in full mode, and a tabbed settings landing page in simple mode."
    capabilities:
      - "View account consumption statistics"
      - "Compare total queries across the last 30 days, last 12 months, and since opening"
      - "Review the total number of Knowledge Boxes"
      - "Switch between Consumption, Subscriptions, Users, and Preferences tabs in simple mode"
  - id: account-settings
    route: "/at/:account/manage/settings"
    title: "Manage account"
    summary: "This page exposes editable account details, SAML single sign-on settings, and account deletion controls."
    capabilities:
      - "Review the account UID, slug, name, and description"
      - "Edit and save account details"
      - "Configure SAML domains, entity ID, SSO URL, certificate, and auth context"
      - "Delete the account or jump to subscription details when deletion is blocked"
  - id: account-kbs
    route: "/at/:account/manage/kbs"
    title: "Account's Knowledge Boxes"
    summary: "This page lists the account Knowledge Boxes with quota information and per-item management actions."
    capabilities:
      - "Review the Knowledge Box count against the account limit"
      - "Open users management for a Knowledge Box"
      - "Edit Knowledge Box preferences"
      - "Create a Knowledge Box"
      - "Delete a Knowledge Box"
  - id: account-arag
    route: "/at/:account/manage/arag"
    title: "Retrieval agents"
    summary: "This page lists retrieval agents for the account and provides create and per-agent action menus."
    capabilities:
      - "Create a retrieval agent"
      - "Open the edit configuration flow for an agent"
      - "Open the sessions list for an agent"
      - "Delete an agent"
  - id: account-users
    route: "/at/:account/manage/users"
    title: "Manage users"
    summary: "This page shows user and license counts and a table of current users and pending invitations."
    capabilities:
      - "Invite a user by email and role"
      - "Review the total number of users and licenses left"
      - "Change a user role"
      - "Delete a user or pending invitation"
  - id: account-models
    route: "/at/:account/manage/models"
    title: "Models"
    summary: "This page manages account-wide model settings and model restriction integrations through two tabs."
    capabilities:
      - "Switch between Settings and Model restrictions tabs"
      - "Create a model configuration"
      - "Delete a model configuration"
      - "Set up a Bedrock integration"
      - "Delete an existing integration"
  - id: account-nua
    route: "/at/:account/manage/nua"
    title: "Agentic RAG Understanding API keys"
    summary: "This page lists Agentic RAG Understanding API keys and the actions available for each key."
    capabilities:
      - "Create a new Agentic RAG Understanding API key"
      - "Review existing keys"
      - "Open a key activity log"
      - "Generate a new key"
      - "Delete a key"
  - id: billing-subscriptions
    route: "/at/:account/manage/billing/subscriptions"
    title: "Subscription tiers"
    summary: "This page compares subscription tiers, pricing, limits, and included features for the account."
    capabilities:
      - "Compare subscription tiers and monthly pricing"
      - "Review included limits and features such as file size, Knowledge Boxes, support, and audit log"
      - "Upgrade to a plan"
      - "Contact sales"
      - "See which plan is the current plan"
  - id: billing-my-subscription
    route: "/at/:account/manage/billing/my-subscription"
    title: "My subscription"
    summary: "This page shows the current subscription, quotas, over-limit costs, next payment details, and cancellation state."
    capabilities:
      - "Review quotas and over-limit pricing"
      - "Check the next payment date"
      - "End subscription renewal"
      - "Reactivate a subscription that is ending"
  - id: kb-home
    route: "/at/:account/:zone/:kb"
    title: "Knowledge Box: {{name}}"
    summary: "This overview page combines KB identifiers, developer integration details, recent resources, storage totals, usage charts, and REMi health signals."
    capabilities:
      - "Open KB settings"
      - "Copy the endpoint, MCP server command, and UID"
      - "Open the test page"
      - "Jump to the full resource list and switch between processed and pending recent resources"
      - "Review storage totals and usage charts"
      - "Open fullscreen usage charts or more metrics"
  - id: kb-upload
    route: "/at/:account/:zone/:kb/upload"
    title: "Upload data"
    summary: "This page presents the available upload modes for adding content to the Knowledge Box."
    capabilities:
      - "Upload files"
      - "Upload folders"
      - "Add links, text or CSV content, sitemaps, or Q&A content"
      - "Go to the Synchronize page"
  - id: kb-resources
    route: "/at/:account/:zone/:kb/resources"
    title: "Resources"
    summary: "This page is the main resource list with search, filters, status views, and quick access to upload more content."
    capabilities:
      - "Filter resources by type, labels, date, and visibility"
      - "Search resources"
      - "Switch between processed, processing, and error views"
      - "Upload more content"
      - "Clear active filters"
  - id: kb-search
    route: "/at/:account/:zone/:kb/search"
    title: "Search"
    summary: "This page shows a live search preview beside a collapsible configuration panel for the current search setup."
    capabilities:
      - "Preview the search experience"
      - "Open or close the configuration panel"
      - "Resize the configuration panel"
      - "Update the search configuration"
      - "Create a widget from the current configuration"
  - id: kb-entities
    route: "/at/:account/:zone/:kb/entities"
    title: "NER"
    summary: "This page lets you browse named-entity families and inspect the entities inside the selected family."
    capabilities:
      - "Browse entity families"
      - "Select a family to inspect"
      - "Search within the selected family"
  - id: kb-label-sets
    route: "/at/:account/:zone/:kb/label-sets"
    title: "Label sets"
    summary: "This page groups label sets by type and exposes creation and missing-label checks."
    capabilities:
      - "Browse resource label sets"
      - "Browse text block label sets"
      - "Create a label set"
      - "Check for missing labels"
  - id: kb-ai-models
    route: "/at/:account/:zone/:kb/ai-models"
    title: "AI models"
    summary: "This tabbed page lets you configure AI model behavior for answer generation, summarization, semantic search, extraction, and anonymization."
    capabilities:
      - "Switch between AI model configuration tabs"
      - "Configure answer generation settings"
      - "Configure summarization and semantic model settings"
      - "Configure extraction and anonymization settings"
  - id: kb-widgets
    route: "/at/:account/:zone/:kb/widgets"
    title: "Widgets"
    summary: "This page lists saved widgets for the current space and exposes creation and item-level actions."
    capabilities:
      - "Create a widget"
      - "Open a widget from the list"
      - "Preview a widget"
      - "Rename or duplicate a widget"
      - "Delete a widget"
  - id: kb-settings
    route: "/at/:account/:zone/:kb/manage/general"
    title: "Settings"
    summary: "This settings form shows identifiers, descriptive fields, access controls, and state controls for the current KB or agent."
    capabilities:
      - "Edit the slug, name, and description"
      - "Toggle hidden-resource and security settings"
      - "Set allowed origins and IP addresses"
      - "Publish or retire the current space"
      - "Save or cancel changes"
  - id: kb-kv-schemas
    route: "/at/:account/:zone/:kb/manage/kv-schemas"
    title: "Structured field schemas"
    summary: "This page lists reusable structured field schemas and the fields defined inside each schema."
    capabilities:
      - "Add a schema"
      - "Review schema descriptions and fields"
      - "See which fields are required"
      - "Edit a schema"
      - "Delete a schema"
  - id: kb-users
    route: "/at/:account/:zone/:kb/users"
    title: "Users"
    summary: "This page manages access for the current KB or agent with invitations, sorting, role changes, and removal actions."
    capabilities:
      - "Invite a user by email and role"
      - "Sort the user list"
      - "Change a user role"
      - "Delete a user or pending invitation"
  - id: kb-keys
    route: "/at/:account/:zone/:kb/keys"
    title: "API keys"
    summary: "This page manages service-access entries and API keys for the current KB or agent, with creation and cleanup actions."
    capabilities:
      - "Create a service access entry"
      - "Generate an API key for a service access"
      - "Expand and review existing keys and expiry dates"
      - "Delete a service access or individual key"
      - "Read the API key usage hint"
  - id: kb-usage-analytics
    route: "/at/:account/:zone/:kb/metrics/usage-analytics"
    title: "Usage Analysis"
    summary: "This metrics page focuses on user queries, agent responses, and REMi score averages, with filters and period-based downloads."
    capabilities:
      - "Pick a month range"
      - "Apply status and condition filters"
      - "Download logs for the selected period"
      - "Review average answer, context, and groundedness cards"
      - "Open row details in the side panel"
  - id: kb-search-activity
    route: "/at/:account/:zone/:kb/metrics/search-activity"
    title: "Search Activity"
    summary: "This page shows search activity logs with totals, column controls, filters, exports, and row drill-down."
    capabilities:
      - "Pick a month"
      - "Search the activity table"
      - "Apply condition and date filters"
      - "Toggle visible columns"
      - "Download CSV or NDJSON exports"
      - "Open row details in the side panel"
  - id: kb-resource-activity
    route: "/at/:account/:zone/:kb/metrics/resource-activity"
    title: "Resource Activity"
    summary: "This page tracks ingestion and processing activity for resources, with synthetic status filters and summary cards."
    capabilities:
      - "Pick a month"
      - "Filter by synthetic status and field conditions"
      - "Search the activity table"
      - "Download CSV or NDJSON exports"
      - "Review processed resource and paragraph totals"
      - "Open row details in the side panel"
  - id: kb-tokens-time-usage
    route: "/at/:account/:zone/:kb/metrics/tokens-and-time-usage"
    title: "Tokens & Time Usage"
    summary: "This page tracks token and time consumption with filters, searchable logs, exports, and a billed-token summary card."
    capabilities:
      - "Pick a month"
      - "Search the usage table"
      - "Apply boolean, numeric, and date filters"
      - "Toggle visible columns"
      - "Download CSV or NDJSON exports"
      - "Review total billed tokens"
  - id: kb-remi-analytics
    route: "/at/:account/:zone/:kb/metrics/remi-analytics"
    title: "RAG Evaluation Metrics (REMi)"
    summary: "This page evaluates RAG performance with health and evolution charts plus expandable missing-knowledge and bad-feedback sections."
    capabilities:
      - "Change the evaluation period"
      - "Review health status and performance evolution charts"
      - "Open the Tokens & Time Usage page from the download banner"
      - "Adjust missing-knowledge criteria such as month and context threshold"
      - "Page through missing-knowledge and bad-feedback results"
      - "Open item details and advice actions in the accordions"
  - id: kb-user-feedback
    route: "/at/:account/:zone/:kb/metrics/user-feedback"
    title: "User Feedback"
    summary: "This page lists user feedback events with month selection, search, filters, exports, and row details."
    capabilities:
      - "Pick a month"
      - "Search feedback entries"
      - "Apply boolean and date filters"
      - "Toggle visible columns"
      - "Download CSV or NDJSON exports"
      - "Open row details in the side panel"
  - id: kb-rag-lab
    route: "/at/:account/:zone/:kb/rag-lab"
    title: "RAG lab"
    summary: "This page is a tabbed lab for experimenting with prompt and RAG setups before applying them to the KB."
    capabilities:
      - "Switch between Prompt lab and RAG lab"
      - "Test different search and RAG strategies"
      - "Compare settings before applying them to the Knowledge Box"
  - id: kb-tasks
    route: "/at/:account/:zone/:kb/tasks"
    title: "Data Augmentation Agents"
    summary: "This page lists existing automation agents and offers cards for creating new data-augmentation tasks."
    capabilities:
      - "Open an existing automation agent"
      - "Sort agents by creation date"
      - "Edit, duplicate, clean, or delete an agent"
      - "Create labeler, ask, graph, synthetic-questions, llama-guard, or prompt-guard agents"
  - id: kb-sync
    route: "/at/:account/:zone/:kb/sync"
    title: "Synchronize"
    summary: "This page configures sync mode, lets you add connector sources, and lists existing sync jobs."
    capabilities:
      - "Choose cloud, desktop, or server sync mode"
      - "Save a custom server URL"
      - "Add a source from the connector gallery"
      - "Review sync jobs and their last sync state"
      - "Enable or disable a sync"
      - "Open edit, folder, activity, or delete actions from the sync menu"
  - id: agent-workflows
    route: "/at/:account/:zone/arag/:agent/workflows"
    title: "Agent workflows"
    summary: "This page shows the MCP endpoint for the agent and a table of existing workflows."
    capabilities:
      - "Create a workflow"
      - "Copy the MCP endpoint"
      - "Open a workflow from the table"
      - "Edit a workflow"
      - "Edit workflow tool parameters"
      - "Delete a non-default workflow"
  - id: agent-sessions
    route: "/at/:account/:zone/arag/:agent/sessions"
    title: "Sessions list"
    summary: "This page lists saved agent sessions with search, date filters, pagination, and delete actions."
    capabilities:
      - "Search sessions"
      - "Filter sessions by date range"
      - "Open a saved session preview"
      - "Delete a session"
      - "Change page and page size"
  - id: agent-sources
    route: "/at/:account/:zone/arag/:agent/sources"
    title: "Sources"
    summary: "This page manages the external sources available to the current retrieval agent."
    capabilities:
      - "Open the add-source menu"
      - "Add a source of a selected driver type"
      - "Review source name and provider columns"
      - "Edit a source"
      - "Delete a source"
  - id: agent-search
    route: "/at/:account/:zone/arag/:agent/search"
    title: "Search"
    summary: "This page shows a live search preview beside a collapsible configuration panel for the current search setup."
    capabilities:
      - "Preview the search experience"
      - "Open or close the configuration panel"
      - "Resize the configuration panel"
      - "Update the search configuration"
      - "Create a widget from the current configuration"
  - id: agent-widgets
    route: "/at/:account/:zone/arag/:agent/widgets"
    title: "Widgets"
    summary: "This page lists saved widgets for the current space and exposes creation and item-level actions."
    capabilities:
      - "Create a widget"
      - "Open a widget from the list"
      - "Preview a widget"
      - "Rename or duplicate a widget"
      - "Delete a widget"
  - id: agent-settings
    route: "/at/:account/:zone/arag/:agent/manage"
    title: "Settings"
    summary: "This settings form shows identifiers, descriptive fields, access controls, and state controls for the current KB or agent."
    capabilities:
      - "Edit the slug, name, and description"
      - "Toggle hidden-resource and security settings"
      - "Set allowed origins and IP addresses"
      - "Publish or retire the current space"
      - "Save or cancel changes"
  - id: agent-users
    route: "/at/:account/:zone/arag/:agent/users"
    title: "Users"
    summary: "This page manages access for the current KB or agent with invitations, sorting, role changes, and removal actions."
    capabilities:
      - "Invite a user by email and role"
      - "Sort the user list"
      - "Change a user role"
      - "Delete a user or pending invitation"
  - id: agent-keys
    route: "/at/:account/:zone/arag/:agent/keys"
    title: "API keys"
    summary: "This page manages service-access entries and API keys for the current KB or agent, with creation and cleanup actions."
    capabilities:
      - "Create a service access entry"
      - "Generate an API key for a service access"
      - "Expand and review existing keys and expiry dates"
      - "Delete a service access or individual key"
      - "Read the API key usage hint"
  - id: agent-activity
    route: "/at/:account/:zone/arag/:agent/activity"
    title: "Activity log"
    summary: "This page lets you request and expand monthly activity-log downloads for the current agent."
    capabilities:
      - "Request a log download for a month"
      - "Refresh an existing download"
      - "Expand a month to inspect its log table"
  - id: agent-ai-models
    route: "/at/:account/:zone/arag/:agent/ai-models"
    title: "AI models"
    summary: "This tabbed page lets you configure AI model behavior for answer generation, summarization, semantic search, extraction, and anonymization."
    capabilities:
      - "Switch between AI model configuration tabs"
      - "Configure answer generation settings"
      - "Configure summarization and semantic model settings"
      - "Configure extraction and anonymization settings"
