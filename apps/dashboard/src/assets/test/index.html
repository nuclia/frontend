<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Agentic RAG - Test page</title>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1" />
    <link
      rel="stylesheet"
      href="./styles.css" />
    <link
      rel="icon"
      type="image/x-icon"
      href="/assets/favicon.ico" />
  </head>
  <body>
    <div class="topbar">
      <img
        class="logo"
        src="/assets/logos/logo.svg"
        alt="Logo" />
    </div>
    <div class="container">
      <div class="inner-container">
        <header>
          <h1>Testing page</h1>
          <div class="metadata">
            <div class="parameter">
              <strong>Knowledge Box:</strong>
              <span class="knowledgebox-name"></span>
            </div>
            <div class="separator"></div>
            <div class="parameter">
              <strong>Widget:</strong>
              <span class="widget-name"></span>
            </div>
            <div class="separator"></div>
            <div class="parameter">
              <strong>Valid until:</strong>
              <span class="expiration-date"></span>
            </div>
          </div>
        </header>
        <div class="widget"></div>
        <div
          class="expired"
          hidden>
          This page has expired
        </div>
      </div>
    </div>
    <script
      type="text/javascript"
      src="./script.js"></script>
  </body>
</html>
