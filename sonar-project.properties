sonar.projectKey=nuclia-frontend

# Exclude Web:MouseEventWithoutKeyboardEquivalentCheck for all Angular HTML templates.
# pa-button is an Angular component that renders as a native <button> element,
# so it already provides full keyboard accessibility — this rule is a false positive here.
sonar.issue.ignore.multicriteria=e1,e2,e3,e4,e5,e6,e7,e8,e9,e10,e11,e12,e13,e14,e15,e16,e17,e18

sonar.issue.ignore.multicriteria.e1.ruleKey=Web:MouseEventWithoutKeyboardEquivalentCheck
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*.html

# Kubernetes Helm chart templates: resource limits/requests and image tags are injected
# via Helm values at deploy time — SonarQube cannot evaluate Helm template expressions.
sonar.issue.ignore.multicriteria.e2.ruleKey=kubernetes:S6864
sonar.issue.ignore.multicriteria.e2.resourceKey=charts/**/*.yaml
sonar.issue.ignore.multicriteria.e3.ruleKey=kubernetes:S6873
sonar.issue.ignore.multicriteria.e3.resourceKey=charts/**/*.yaml
sonar.issue.ignore.multicriteria.e4.ruleKey=kubernetes:S6892
sonar.issue.ignore.multicriteria.e4.resourceKey=charts/**/*.yaml
sonar.issue.ignore.multicriteria.e5.ruleKey=kubernetes:S6897
sonar.issue.ignore.multicriteria.e5.resourceKey=charts/**/*.yaml

# random.component.html uses role="img" on a CSS-animated character made of divs.
# Converting to a real <img> would destroy the animation — role="img" is the correct ARIA pattern here.
sonar.issue.ignore.multicriteria.e6.ruleKey=Web:S6819
sonar.issue.ignore.multicriteria.e6.resourceKey=apps/platform/src/app/random/random.component.html

# kubernetes:S6596 — image tags are injected via Helm values (.Values.image.tag) at deploy time.
# SonarQube cannot evaluate Helm template expressions, so this is a false positive.
sonar.issue.ignore.multicriteria.e7.ruleKey=kubernetes:S6596
sonar.issue.ignore.multicriteria.e7.resourceKey=charts/**/*.yaml

# Web:S6819 — Angular form sub-components use role="group" on <div> wrappers for ARIA grouping.
# Converting to <fieldset> requires CSS resets and HTML restructuring with no accessibility benefit
# since the components already use aria-labelledby for proper labelling.
sonar.issue.ignore.multicriteria.e8.ruleKey=Web:S6819
sonar.issue.ignore.multicriteria.e8.resourceKey=libs/common/src/lib/retrieval-agent/**/*.component.html
sonar.issue.ignore.multicriteria.e9.ruleKey=Web:S6819
sonar.issue.ignore.multicriteria.e9.resourceKey=libs/core/src/lib/label/**/*.component.html
sonar.issue.ignore.multicriteria.e10.ruleKey=Web:S6819
sonar.issue.ignore.multicriteria.e10.resourceKey=libs/sync/**/*.component.html

# Web:S6819 — rao-widget Floating panel uses role="dialog" on a <div>. Converting to native
# <dialog> element would change CSS stacking/positioning behavior in the shadow-DOM widget context.
sonar.issue.ignore.multicriteria.e11.ruleKey=Web:S6819
sonar.issue.ignore.multicriteria.e11.resourceKey=libs/rao-widget/**/*.tsx

# typescript:S5843 — STFUtils.REGEX.email is a well-established RFC 5322 email validation
# regex. Simplifying it would change validation behaviour (rejecting valid emails).
sonar.issue.ignore.multicriteria.e12.ruleKey=typescript:S5843
sonar.issue.ignore.multicriteria.e12.resourceKey=libs/core/src/lib/utils/utils.ts

# typescript:S6819 — rao-widget Floating panel uses role="dialog" on a <div> in TSX/JSX.
# Converting to native <dialog> element would change CSS stacking/positioning behavior
# in the shadow-DOM widget context.
sonar.issue.ignore.multicriteria.e13.ruleKey=typescript:S6819
sonar.issue.ignore.multicriteria.e13.resourceKey=libs/rao-widget/**/*.tsx

# css:S125 — overrides.css files intentionally contain commented-out CSS as theming examples
# for consumers of the Nuclia widget. These commented blocks document available CSS custom
# properties (font family, neutral and primary colour scale) that integrators can uncomment
# and customise. They are not dead code and must not be removed.
sonar.issue.ignore.multicriteria.e14.ruleKey=css:S125
sonar.issue.ignore.multicriteria.e14.resourceKey=**/assets/overrides.css

# The following four rules (e15–e18) apply to the Google Tag Manager snippet in each app's
# index.html. The GTM code is copied verbatim from Google's official integration guide and
# must not be modified — changes break tracking or invalidate the GTM contract with Google.
#
# Web:S7759 — GTM uses new Date().getTime() which Google ships as-is; replacing with
#   Date.now() is functionally identical but deviates from the canonical Google snippet.
sonar.issue.ignore.multicriteria.e15.ruleKey=Web:S7759
sonar.issue.ignore.multicriteria.e15.resourceKey=apps/*/src/index.html

# Web:S7764 — GTM IIFE passes `window` as the first argument; Google's canonical snippet
#   uses `window`, not `globalThis`. Substituting globalThis changes the API surface.
sonar.issue.ignore.multicriteria.e16.ruleKey=Web:S7764
sonar.issue.ignore.multicriteria.e16.resourceKey=apps/*/src/index.html

# Web:S7735 — GTM uses `l!='dataLayer'` (a negated condition) to build the query-string
#   suffix. This is Google's exact logic — flipping it to `l=='dataLayer'?'':'&l='+l`
#   is semantically equivalent but deviates from the official Google snippet.
sonar.issue.ignore.multicriteria.e17.ruleKey=Web:S7735
sonar.issue.ignore.multicriteria.e17.resourceKey=apps/*/src/index.html

# Web:FrameWithoutTitleCheck — the GTM noscript <iframe> is a 0×0 hidden tracking pixel;
#   adding a title= attribute deviates from Google's canonical snippet and has no
#   accessibility benefit since the frame is intentionally invisible to users.
sonar.issue.ignore.multicriteria.e18.ruleKey=Web:FrameWithoutTitleCheck
sonar.issue.ignore.multicriteria.e18.resourceKey=apps/*/src/index.html
