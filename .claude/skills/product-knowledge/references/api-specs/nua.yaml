          title: Name
          default: hierarchy
        count:
          type: integer
          maximum: 1024.0
          minimum: 0.0
          title: Count
          description: Number of extra characters that are added to each matching
            paragraph when adding to the context.
          default: 0
      type: object
      title: HierarchyResourceStrategy
