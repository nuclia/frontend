info:
  title: Nuclia Understanding API
  description: API reference for the Nuclia Understanding API. Requires a NUA API
    Key from the account management interface.
  version: v1
openapi: 3.1.0
servers:
- url: https://{region-x}.stashify.cloud/api/v1
  description: Development server
tags:
- name: Processing
  description: Ingest API endpoints to process data and get results back.
- name: Processing TUS uploads
  description: Processing uploads using TUS protocol
- name: Training
  description: Training API endpoints to train custom models with your data.
- name: Models
  description: Models API
- name: Knowledge Boxes
  description: Knowledge Boxes API
- name: Predict
  description: Predict API to get predictions from our models
- name: Collector
  description: Collector API
paths:
  /account/{account_id}/assume_role/bedrock:
    get:
      tags:
      - Models
      summary: Account Assume Role For Bedrock Models
      description: Start a new assume role authentication flow for an account
      operationId: Account_assume_role_for_bedrock_models_api_v1_account__account_id__assume_role_bedrock_get
      parameters:
      - name: account_id
        in: path
        required: true
        schema:
          type: string
          title: Account Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BedrockAssumeRoleStartResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    post:
      tags:
      - Models
      summary: Account Bedrock Models Authentication
      description: Finish a new bedrock authentication flow for an account
      operationId: Account_bedrock_models_authentication_api_v1_account__account_id__assume_role_bedrock_post
      parameters:
      - name: account_id
        in: path
        required: true
        schema:
          type: string
          title: Account Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BedrockAssumeRoleFinishRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - Models
      summary: Account Bedrock Models Authentication
      description: Delete existing bedrock assume role configuration for an account
      operationId: Account_bedrock_models_authentication_api_v1_account__account_id__assume_role_bedrock_delete
      parameters:
      - name: account_id
        in: path
        required: true
        schema:
          type: string
          title: Account Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /account/{account_id}/assume_role/bedrock/validate:
    get:
      tags:
      - Models
      summary: Account Bedrock Models Authentication
      description: Validate the bedrock assume role configuration for an account
      operationId: Account_bedrock_models_authentication_api_v1_account__account_id__assume_role_bedrock_validate_get
      parameters:
      - name: account_id
        in: path
        required: true
        schema:
          type: string
          title: Account Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /account/{account_id}/dataset/{dataset_id}:
    delete:
      tags:
      - Datasets
      summary: Delete Dataset
      description: Deletes a dataset
      operationId: delete_dataset_api_v1_account__account_id__dataset__dataset_id__delete
      parameters:
      - name: dataset_id
        in: path
        required: true
        schema:
          type: string
          title: Dataset Id
      - name: account_id
        in: path
        required: true
        schema:
          type: string
          title: Account Id
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      tags:
      - Datasets
      summary: Get Dataset
      description: Get a dataset
      operationId: get_dataset_api_v1_account__account_id__dataset__dataset_id__get
      parameters:
      - name: dataset_id
        in: path
        required: true
        schema:
          type: string
          title: Dataset Id
      - name: account_id
        in: path
        required: true
        schema:
          type: string
          title: Account Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatasetCreated'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /account/{account_id}/dataset/{dataset_id}/models:
    get:
      tags:
      - Models
      summary: Learning Configuration Schema
      description: Get available models
      operationId: Learning_configuration_schema_api_v1_account__account_id__dataset__dataset_id__models_get
      parameters:
      - name: account_id
        in: path
        required: true
        schema:
          type: string
          title: Account Id
      - name: dataset_id
        in: path
        required: true
        schema:
          type: string
          title: Dataset Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Learning Configuration Schema Api V1 Account  Account
                  Id  Dataset  Dataset Id  Models Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /account/{account_id}/dataset/{dataset_id}/partition/{partition_id}:
    put:
      tags:
      - Datasets
      summary: Upload Partition Account
      description: Upload a partition of a dataset
      operationId: upload_partition_account_api_v1_account__account_id__dataset__dataset_id__partition__partition_id__put
      parameters:
      - name: dataset_id
        in: path
        required: true
        schema:
          type: string
          title: Dataset Id
      - name: account_id
        in: path
        required: true
        schema:
          type: string
          title: Account Id
      - name: partition_id
        in: path
        required: true
        schema:
          type: string
          title: Partition Id
      - name: content-length
        in: header
        required: true
        schema:
          type: integer
          title: Content-Length
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - Datasets
      summary: Delete Dataset Partition
      description: Deletes a partition of a dataset
      operationId: delete_dataset_partition_api_v1_account__account_id__dataset__dataset_id__partition__partition_id__delete
      parameters:
      - name: dataset_id
        in: path
        required: true
        schema:
          type: string
          title: Dataset Id
      - name: partition_id
        in: path
        required: true
        schema:
          type: string
          pattern: ^[a-zA-Z0-9-_]+$
          title: Partition Id
      - name: account_id
        in: path
        required: true
        schema:
          type: string
          title: Account Id
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /account/{account_id}/dataset/{dataset_id}/partitions:
    delete:
      tags:
      - Datasets
      summary: Delete Dataset Partitions
      description: Deletes all partitions of a dataset
      operationId: delete_dataset_partitions_api_v1_account__account_id__dataset__dataset_id__partitions_delete
      parameters:
      - name: dataset_id
        in: path
        required: true
        schema:
          type: string
          title: Dataset Id
      - name: account_id
        in: path
        required: true
        schema:
          type: string
          title: Account Id
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /account/{account_id}/datasets:
    post:
      tags:
      - Datasets
      summary: Create Dataset Account
      description: Creates a new dataset
      operationId: create_dataset_account_api_v1_account__account_id__datasets_post
      parameters:
      - name: account_id
        in: path
        required: true
        schema:
          type: string
          title: Account Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DatasetInfo'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatasetCreated'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      tags:
      - Datasets
      summary: List Datasets
      description: Lists all datasets
      operationId: list_datasets_api_v1_account__account_id__datasets_get
      parameters:
      - name: account_id
        in: path
        required: true
        schema:
          type: string
          title: Account Id
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatasetsList'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /account/{account_id}/default_model/{model_id}:
    get:
      tags:
      - Models
      summary: Get Public Model Configuration On Account
      description: Get details of a public model configuration on an account
      operationId: Get_public_model_configuration_on_account_api_v1_account__account_id__default_model__model_id__get
      parameters:
      - name: account_id
        in: path
        required: true
        schema:
          type: string
          title: Account Id
      - name: model_id
        in: path
        required: true
        schema:
          type: string
          format: uuid4
          title: Model Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DefaultModelConfig'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - Models
      summary: Public Model Configuration Deletion On Account
      description: Delete specific public model configuration from the account
      operationId: Public_model_configuration_deletion_on_account_api_v1_account__account_id__default_model__model_id__delete
      parameters:
      - name: account_id
        in: path
        required: true
        schema:
          type: string
          title: Account Id
      - name: model_id
        in: path
        required: true
        schema:
          type: string
          format: uuid4
          title: Model Id
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /account/{account_id}/default_models:
    get:
      tags:
      - Models
      summary: List Public Models Configured On An Account
      description: List public models configured on an account
      operationId: List_public_models_configured_on_an_account_api_v1_account__account_id__default_models_get
      parameters:
      - name: account_id
        in: path
        required: true
        schema:
          type: string
          title: Account Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DefaultModelConfigListItem'
                title: Response List Public Models Configured On An Account Api V1
                  Account  Account Id  Default Models Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /account/{account_id}/model/{model_id}:
    get:
      tags:
      - Models
      summary: Learning Configuration Schema
      description: Get trained models
      operationId: Learning_configuration_schema_api_v1_account__account_id__model__model_id__get
      parameters:
      - name: account_id
        in: path
        required: true
        schema:
          type: string
          title: Account Id
      - name: model_id
        in: path
        required: true
        schema:
          type: string
          format: uuid4
          title: Model Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomAccountModel'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - Models
      summary: Model Deletion On Account
      description: Delete specific model from account, destroying action
      operationId: Model_deletion_on_account_api_v1_account__account_id__model__model_id__delete
      parameters:
      - name: account_id
        in: path
        required: true
        schema:
          type: string
          title: Account Id
      - name: model_id
        in: path
        required: true
        schema:
          type: string
          format: uuid4
          title: Model Id
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /account/{account_id}/models:
    get:
      tags:
      - Models
      summary: Learning Configuration Models From Account
      description: Get trained models
      operationId: Learning_configuration_models_from_account_api_v1_account__account_id__models_get
      parameters:
      - name: account_id
        in: path
        required: true
        schema:
          type: string
          title: Account Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CustomAccountModelListItem'
                title: Response Learning Configuration Models From Account Api V1
                  Account  Account Id  Models Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /account/{account_id}/models/{kbid}: {}
  /account/{account_id}/models/{kbid}/{model_id}:
    delete:
      tags:
      - Models
      summary: Delete A Model From A Kb
      description: Remove from availability a model from a KB
      operationId: Delete_a_model_from_a_KB_api_v1_account__account_id__models__kbid___model_id__delete
      parameters:
      - name: kbid
        in: path
        required: true
        schema:
          type: string
          title: Kbid
      - name: model_id
        in: path
        required: true
        schema:
          type: string
          title: Model Id
      - name: account_id
        in: path
        required: true
        schema:
          type: string
          title: Account Id
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /account/{account_id}/schema:
    get:
      tags:
      - Models
      summary: Learning Configuration Schema
      description: Get schema for creating a KB
      operationId: Learning_configuration_schema_api_v1_account__account_id__schema_get
      parameters:
      - name: account_id
        in: path
        required: true
        schema:
          type: string
          title: Account Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigSchema'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /agent/{agent_id}/audit/download_request/{request_id}:
    delete:
      tags:
      - Downloads
      summary: Delete Download Request
      description: Delete a download request by its ID
      operationId: delete_download_request_api_v1_agent__agent_id__audit_download_request__request_id__delete
      parameters:
      - name: agent_id
        in: path
        required: true
        schema:
          type: string
          title: Agent Id
      - name: request_id
        in: path
        required: true
        schema:
          type: string
          title: Request Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /agent/{agent_id}/audit/download_request/{request_id}/status:
    get:
      tags:
      - Downloads
      summary: Get Download Request Status
      description: Get status of an audit download request by its ID
      operationId: get_download_request_status_api_v1_agent__agent_id__audit_download_request__request_id__status_get
      parameters:
      - name: agent_id
        in: path
        required: true
        schema:
          type: string
          title: Agent Id
      - name: request_id
        in: path
        required: true
        schema:
          type: string
          title: Request Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DownloadStatus'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /agent/{agent_id}/audit/download_requests:
    get:
      tags:
      - Downloads
      summary: List Download Requests
      description: List all download requests for the account
      operationId: list_download_requests_api_v1_agent__agent_id__audit_download_requests_get
      parameters:
      - name: agent_id
        in: path
        required: true
        schema:
          type: string
          title: Agent Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DownloadStatus'
                title: Response List Download Requests Api V1 Agent  Agent Id  Audit
                  Download Requests Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /agent/{agent_id}/audit/interactions/download:
    post:
      tags:
      - Retrieval Agent
      summary: Request Interactions Audit Download
      description: Request a download for the audit log of an agent's interactions
      operationId: request_interactions_audit_download_api_v1_agent__agent_id__audit_interactions_download_post
      parameters:
      - name: agent_id
        in: path
        required: true
        schema:
          type: string
          title: Agent Id
      - name: accept
        in: header
        required: false
        schema:
          enum:
          - application/x-ndjson
          - text/csv
          type: string
          default: text/csv
          title: Accept
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InteractionsAuditDownloadRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DownloadStatus'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /agent/{agent_id}/driver/{driver}:
    patch:
      tags:
      - Retrieval Agent
      summary: Patch Driver
      description: Set Agent Configuration
      operationId: patch_driver_api_v1_agent__agent_id__driver__driver__patch
      parameters:
      - name: agent_id
        in: path
        required: true
        schema:
          type: string
          title: Agent Id
      - name: driver
        in: path
        required: true
        schema:
          type: string
          title: Driver
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
              - $ref: '#/components/schemas/AliniaDriverConfig'
              - $ref: '#/components/schemas/BraveDriverConfig'
              - $ref: '#/components/schemas/CypherDriverConfig'
              - $ref: '#/components/schemas/GoogleDriverConfig'
              - $ref: '#/components/schemas/MCPHTTPDriverConfig'
              - $ref: '#/components/schemas/MCPSSEDriverConfig'
              - $ref: '#/components/schemas/MCPStdioDriverConfig-Input'
              - $ref: '#/components/schemas/MarkLogicDriverConfig'
              - $ref: '#/components/schemas/NucliaDBConfig'
              - $ref: '#/components/schemas/PerplexityDriverConfig'
              - $ref: '#/components/schemas/SitefinityDriverConfig'
              - $ref: '#/components/schemas/SQLDriverConfig'
              - $ref: '#/components/schemas/TavilyDriverConfig'
              - $ref: '#/components/schemas/SyncDriverConfig'
              discriminator:
                propertyName: provider
                mapping:
                  alinia: '#/components/schemas/AliniaDriverConfig'
                  brave: '#/components/schemas/BraveDriverConfig'
                  cypher: '#/components/schemas/CypherDriverConfig'
                  google: '#/components/schemas/GoogleDriverConfig'
                  mcphttp: '#/components/schemas/MCPHTTPDriverConfig'
                  mcpsse: '#/components/schemas/MCPSSEDriverConfig'
                  mcpstdio: '#/components/schemas/MCPStdioDriverConfig-Input'
                  marklogic: '#/components/schemas/MarkLogicDriverConfig'
                  nucliadb: '#/components/schemas/NucliaDBConfig'
                  perplexity: '#/components/schemas/PerplexityDriverConfig'
                  sitefinity: '#/components/schemas/SitefinityDriverConfig'
                  sql: '#/components/schemas/SQLDriverConfig'
                  tavily: '#/components/schemas/TavilyDriverConfig'
                  sync: '#/components/schemas/SyncDriverConfig'
              title: Item
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - Retrieval Agent
      summary: Delete Driver
      description: Set Agent Configuration
      operationId: delete_driver_api_v1_agent__agent_id__driver__driver__delete
      parameters:
      - name: agent_id
        in: path
        required: true
        schema:
          type: string
          title: Agent Id
      - name: driver
        in: path
        required: true
        schema:
          type: string
          title: Driver
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /agent/{agent_id}/drivers:
    post:
      tags:
      - Retrieval Agent
      summary: Add Driver
      description: Set Agent Configuration
      operationId: add_driver_api_v1_agent__agent_id__drivers_post
      parameters:
      - name: agent_id
        in: path
        required: true
        schema:
          type: string
          title: Agent Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
              - $ref: '#/components/schemas/AliniaDriverConfig'
              - $ref: '#/components/schemas/BraveDriverConfig'
              - $ref: '#/components/schemas/CypherDriverConfig'
              - $ref: '#/components/schemas/GoogleDriverConfig'
              - $ref: '#/components/schemas/MCPHTTPDriverConfig'
              - $ref: '#/components/schemas/MCPSSEDriverConfig'
              - $ref: '#/components/schemas/MCPStdioDriverConfig-Input'
              - $ref: '#/components/schemas/MarkLogicDriverConfig'
              - $ref: '#/components/schemas/NucliaDBConfig'
              - $ref: '#/components/schemas/PerplexityDriverConfig'
              - $ref: '#/components/schemas/SitefinityDriverConfig'
              - $ref: '#/components/schemas/SQLDriverConfig'
              - $ref: '#/components/schemas/TavilyDriverConfig'
              - $ref: '#/components/schemas/SyncDriverConfig'
              discriminator:
                propertyName: provider
                mapping:
                  alinia: '#/components/schemas/AliniaDriverConfig'
                  brave: '#/components/schemas/BraveDriverConfig'
                  cypher: '#/components/schemas/CypherDriverConfig'
                  google: '#/components/schemas/GoogleDriverConfig'
                  mcphttp: '#/components/schemas/MCPHTTPDriverConfig'
                  mcpsse: '#/components/schemas/MCPSSEDriverConfig'
                  mcpstdio: '#/components/schemas/MCPStdioDriverConfig-Input'
                  marklogic: '#/components/schemas/MarkLogicDriverConfig'
                  nucliadb: '#/components/schemas/NucliaDBConfig'
                  perplexity: '#/components/schemas/PerplexityDriverConfig'
                  sitefinity: '#/components/schemas/SitefinityDriverConfig'
