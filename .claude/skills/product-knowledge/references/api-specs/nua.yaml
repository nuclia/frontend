            effort feature.'
          default:
            type: required
          discriminator:
            propertyName: type
            mapping:
              auto: '#/components/schemas/ToolChoiceAuto'
              forced: '#/components/schemas/ToolChoiceForced'
              none: '#/components/schemas/ToolChoiceNone'
              required: '#/components/schemas/ToolChoiceRequired'
