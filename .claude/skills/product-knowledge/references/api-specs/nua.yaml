          type: array
          title: Tools
          description: List of tools to choose
        tool_choice:
          oneOf:
          - $ref: '#/components/schemas/ToolChoiceAuto'
          - $ref: '#/components/schemas/ToolChoiceNone'
          - $ref: '#/components/schemas/ToolChoiceRequired'
          - $ref: '#/components/schemas/ToolChoiceForced'
          title: Tool Choice
          description: 'Tool choice strategy. `auto`: The model decides whether to
            use a tool or not based on the prompt and available tools. `required`
            (default): A tool must be used.`none`: Disables tool usage even if tools
            are provided.`forced`: Forces the use of a specific tool provided in `name`.Important:
