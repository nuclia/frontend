        \nThis endpoint checks if the provided credentials have access to the files/items\n\
        specified in the request. The provider is determined from the sync config.\n\
        Credentials must be encrypted using the same encryption key used for external\
        \ connections.\n\nArgs:\n    kb_id: The knowledge base ID.\n    config_id:\
        \ The sync config ID (determines the provider).\n    item: The validation\
        \ input containing encrypted credentials and resources to validate.\n\nReturns:\n\
        \    ResourceValidationOutput with lists of valid and invalid resources."
