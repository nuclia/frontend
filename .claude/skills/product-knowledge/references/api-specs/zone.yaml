info:
  title: Knowledge Box & Zone REST API
  description: API documentation for managing Knowledge Boxes, NUA keys, and API Keys
    within designated zones.
  version: v1
openapi: 3.1.0
servers:
- url: https://{region-x}.stashify.cloud
  description: Development server
tags:
- description: Operations for creating, reading, updating, and deleting Knowledge
    Boxes.
  name: Knowledge Boxes
- description: Management of users assigned to a Knowledge Box.
  name: Users
- description: Handling Knowledge Box invitation management.
  name: Invites
- description: Management of API keys assigned to a Knowledge Box.
  name: API Keys
- description: Management of NUA keys.
  name: NUA Keys
- description: Management of Activity logs for a Knowledge Box.
  name: Knowledgebox activity
- description: Management of Backups for a Knowledge Box.
  name: Backups
paths:
  /api/auth/magic: {}
  /api/export/{export_id}/import_to/{kb_uuid}: {}
  /api/exports: {}
  /api/v1/account/{account_id}/backup/{backup_id}:
    delete:
      tags:
      - Backups
      summary: Delete
      description: Delete knowledgebox backup
      operationId: delete_api_v1_account__account_id__backup__backup_id__delete
      parameters:
      - name: account_id
        in: path
        required: true
        schema:
          type: string
          title: Account Id
      - name: backup_id
        in: path
        required: true
        schema:
          type: string
          title: Backup Id
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/account/{account_id}/backup/{backup_id}/restore:
    post:
      tags:
      - Backups
      summary: Restore
      description: Restore a backup into a new knowledgebox
      operationId: restore_api_v1_account__account_id__backup__backup_id__restore_post
      parameters:
      - name: account_id
        in: path
        required: true
        schema:
          type: string
          title: Account Id
      - name: backup_id
        in: path
        required: true
        schema:
          type: string
          title: Backup Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BackupRestore'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemCreated'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/account/{account_id}/backups:
    post:
      tags:
      - Backups
      summary: Create
      description: Create knowledgebox backup
      operationId: create_api_v1_account__account_id__backups_post
      parameters:
      - name: account_id
        in: path
        required: true
        schema:
          type: string
          title: Account Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BackupCreate'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BackupCreateResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      tags:
      - Backups
      summary: List
      description: Get all backups from an account in a region
      operationId: list_api_v1_account__account_id__backups_get
      parameters:
      - name: account_id
        in: path
        required: true
        schema:
          type: string
          title: Account Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BackupResponse'
                title: Response List Api V1 Account  Account Id  Backups Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/account/{account_id}/kb/{kb_id}:
    get:
      tags:
      - Knowledge Boxes
      summary: Get Knowledge Box
      operationId: get_knowledge_box_api_v1_account__account_id__kb__kb_id__get
      parameters:
      - name: account_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Account Id
      - name: kb_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Kb Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KnowledgeBox'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    patch:
      tags:
      - Knowledge Boxes
      summary: Modify Knowledge Box
      description: Modifies an existing Knowledge Box.
      operationId: modify_knowledge_box_api_v1_account__account_id__kb__kb_id__patch
      parameters:
      - name: account_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Account Id
      - name: kb_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Kb Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KnowledgeBoxUpdate'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Modify Knowledge Box Api V1 Account  Account Id  Kb  Kb
                  Id  Patch
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - Knowledge Boxes
      summary: Delete Knowledge Box
      operationId: delete_knowledge_box_api_v1_account__account_id__kb__kb_id__delete
      parameters:
      - name: account_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Account Id
      - name: kb_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Kb Id
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/account/{account_id}/kb/{kb_id}/ephemeral_tokens:
    post:
      tags:
      - Knowledge Boxes
      summary: Create Ephemeral Token
      description: Create an ephemeral token to access the Knowledge Box
      operationId: create_ephemeral_token_api_v1_account__account_id__kb__kb_id__ephemeral_tokens_post
      parameters:
      - name: account_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Account Id
      - name: kb_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Kb Id
      requestBody:
        content:
          application/json:
            schema:
              anyOf:
              - $ref: '#/components/schemas/EphemeralTokenProperties'
              - type: 'null'
              title: Payload
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EphemeralTokenResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/account/{account_id}/kb/{kb_id}/invite:
    post:
      tags:
      - Invites
      summary: Invite To Knowledge Box
      description: Send an invitation to join a Knowledge Box via email.
      operationId: invite_to_knowledge_box_api_v1_account__account_id__kb__kb_id__invite_post
      parameters:
      - name: account_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Account Id
      - name: kb_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Kb Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InviteKnowledgeBoxPayload'
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - Invites
      summary: Delete Invite
      description: Invalidate an invite to join a Knowledge Box
      operationId: delete_invite_api_v1_account__account_id__kb__kb_id__invite_delete
      parameters:
      - name: account_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Account Id
      - name: kb_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Kb Id
      - name: email
        in: query
        required: true
        schema:
          type: string
          format: email
          title: Email
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/account/{account_id}/kb/{kb_id}/invites:
    get:
      tags:
      - Invites
      summary: Invited Users
      description: List of users invited to a Knowledge Box, but not yet joined
      operationId: invited_users_api_v1_account__account_id__kb__kb_id__invites_get
      parameters:
      - name: account_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Account Id
      - name: kb_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Kb Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/KbInvitedUser'
                title: Response Invited Users Api V1 Account  Account Id  Kb  Kb Id  Invites
                  Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/account/{account_id}/kb/{kb_id}/logo.png:
    get:
      tags:
      - Knowledge Boxes
      summary: Download Logo
      description: Knowledge Box logo
      operationId: download_logo_api_v1_account__account_id__kb__kb_id__logo_png_get
      parameters:
      - name: account_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Account Id
      - name: kb_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Kb Id
      responses:
        '200':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/account/{account_id}/kb/{kb_id}/permissions:
    get:
      tags:
      - Knowledge Boxes
      summary: Get Knowledge Box Permissions
      operationId: get_knowledge_box_permissions_api_v1_account__account_id__kb__kb_id__permissions_get
      parameters:
      - name: account_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Account Id
      - name: kb_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Kb Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PermissionsResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/account/{account_id}/kb/{kb_id}/service_account/{sa_id}:
    delete:
      tags:
      - API Keys
      summary: Delete Service Account
      description: Delete a new Service Account for a Knowledge Box
      operationId: delete_service_account_api_v1_account__account_id__kb__kb_id__service_account__sa_id__delete
      parameters:
      - name: account_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Account Id
      - name: kb_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Kb Id
      - name: sa_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Sa Id
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/account/{account_id}/kb/{kb_id}/service_account/{sa_id}/key/{sa_key_id}:
    delete:
      tags:
      - API Keys
      summary: Delete Api Key
      description: Delete an API Key of a Knowledge Box
      operationId: delete_api_key_api_v1_account__account_id__kb__kb_id__service_account__sa_id__key__sa_key_id__delete
      parameters:
      - name: account_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Account Id
      - name: kb_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Kb Id
      - name: sa_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Sa Id
      - name: sa_key_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Sa Key Id
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/account/{account_id}/kb/{kb_id}/service_account/{sa_id}/keys:
    post:
      tags:
      - API Keys
      summary: Add Service Account Key
      description: Create an API Key for a Service Account of a Knowledge Box
      operationId: add_service_account_key_api_v1_account__account_id__kb__kb_id__service_account__sa_id__keys_post
      parameters:
      - name: account_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Account Id
      - name: kb_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Kb Id
      - name: sa_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Sa Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServiceAccountKeyCreation'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceAccountJWT'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/account/{account_id}/kb/{kb_id}/service_accounts:
    get:
      tags:
      - API Keys
      summary: List Service Accounts
      description: List of Service Accounts of a Knowledge Box
      operationId: list_service_accounts_api_v1_account__account_id__kb__kb_id__service_accounts_get
      parameters:
      - name: account_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Account Id
      - name: kb_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Kb Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ServiceAccount'
                title: Response List Service Accounts Api V1 Account  Account Id  Kb  Kb
                  Id  Service Accounts Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    post:
      tags:
      - API Keys
      summary: Add Service Account
      description: Create a new Service Account for a Knowledge Box
      operationId: add_service_account_api_v1_account__account_id__kb__kb_id__service_accounts_post
      parameters:
      - name: account_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Account Id
      - name: kb_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Kb Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServiceAccountCreation'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemCreated'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/account/{account_id}/kb/{kb_id}/users:
    get:
      tags:
      - Users
      summary: Users
      description: List of users of a Knowledge Box
      operationId: users_api_v1_account__account_id__kb__kb_id__users_get
      parameters:
      - name: account_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Account Id
      - name: kb_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Kb Id
      - name: include_user_detail
        in: query
        required: false
        schema:
          type: boolean
          default: false
          title: Include User Detail
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/KbUser'
                title: Response Users Api V1 Account  Account Id  Kb  Kb Id  Users
                  Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    patch:
      tags:
      - Users
      summary: Update Users
      description: Assign or remove users from a Knowledge Box
      operationId: update_users_api_v1_account__account_id__kb__kb_id__users_patch
      parameters:
      - name: account_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Account Id
      - name: kb_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Kb Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchUpdateKbUsers'
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/account/{account_id}/kbs:
    get:
      tags:
      - Knowledge Boxes
      summary: List Knowledge Boxes
      description: List all region Knowledge Boxes that belongs to an specific account
        that the authenticated user can see
      operationId: list_knowledge_boxes_api_v1_account__account_id__kbs_get
      parameters:
      - name: account_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Account Id
      - name: mode
        in: query
        required: false
        schema:
          enum:
          - kb
          - agent
          - agent_no_memory
          - agents
          type: string
          description: Optional mode filter. 'kb' for standard KBs, 'agent' for agents
            with memory, 'agent_no_memory' for agents without memory, 'agents' for
            all agent types (agent + agent_no_memory). Defaults to 'kb'.
          default: kb
          title: Mode
        description: Optional mode filter. 'kb' for standard KBs, 'agent' for agents
          with memory, 'agent_no_memory' for agents without memory, 'agents' for all
          agent types (agent + agent_no_memory). Defaults to 'kb'.
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/KnowledgeBoxSummary'
                title: Response List Knowledge Boxes Api V1 Account  Account Id  Kbs
                  Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    post:
      tags:
      - Knowledge Boxes
      summary: Create Knowledge Box
      description: Creates a new Knowledge Box. The accepted values for the `learning_configuration`
        are dynamic and may be dependant of the account used. Accepted field values
        needs to be checked on the 'Learning configuration schema' endpoint
      operationId: create_knowledge_box_api_v1_account__account_id__kbs_post
      parameters:
      - name: account_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Account Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KnowledgeBoxCreation'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemCreated'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/account/{account_id}/nua_client/{client_id}:
    delete:
      tags:
      - NUA Keys
      summary: Delete Nua Client By Id
      description: Deletes an existing Nuclia Understanding API client
      operationId: delete_nua_client_by_id_api_v1_account__account_id__nua_client__client_id__delete
      parameters:
      - name: account_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Account Id
      - name: client_id
        in: path
        required: true
        schema:
          type: string
          pattern: ^[a-z0-9_-]+$
          title: Client Id
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      tags:
      - NUA Keys
      summary: Get Nua Client By Id
      description: Gets the metadata of an existing Nuclia Understanding API
      operationId: get_nua_client_by_id_api_v1_account__account_id__nua_client__client_id__get
      parameters:
      - name: account_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Account Id
      - name: client_id
        in: path
        required: true
        schema:
          type: string
          pattern: ^[a-z0-9_-]+$
          title: Client Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NUAClientMetadata'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/account/{account_id}/nua_client/{client_id}/key:
    put:
      tags:
      - NUA Keys
      summary: Set Account Nua Client Key
      description: Recreates a new session key for an existing Nuclia Understanding
        API client
      operationId: set_account_nua_client_key_api_v1_account__account_id__nua_client__client_id__key_put
      parameters:
      - name: account_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Account Id
      - name: client_id
        in: path
        required: true
        schema:
          type: string
          pattern: ^[a-z0-9_-]+$
          title: Client Id
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NUAClient'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/account/{account_id}/nua_clients:
    get:
      tags:
      - NUA Keys
      summary: Get Account Nua Clients
      description: Gets the list of Nuclia Understanding API clients of an account
      operationId: get_account_nua_clients_api_v1_account__account_id__nua_clients_get
      parameters:
      - name: account_id
