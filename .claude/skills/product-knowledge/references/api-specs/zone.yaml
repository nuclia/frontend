        \ pending sync job that will be processed by the sync job runner.\nReturns\
        \ 409 Conflict if there's already an active (pending or in-progress) job\n\
        for the specified config.\n\nArgs:\n    data: Optional input. Set options.full_sync=True\
        \ to ignore incremental sync state\n        and perform a full re-sync. Note:\
        \ S3 and ShareFile providers always\n        perform full syncs as they don't\
        \ support delta tracking."
      operationId: trigger_sync_api_v1_kb__kb_id__sync_config__config_id__sync_post
      parameters:
      - name: kb_id
