          format: uuid
          title: Kb Id
      - name: job_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Job Id
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 500
          minimum: 1
          description: Maximum number of log entries to return (1-500)
          default: 50
          title: Limit
        description: Maximum number of log entries to return (1-500)
      - name: cursor
        in: query
        required: false
        schema:
          anyOf:
          - type: integer
            minimum: 1
          - type: 'null'
          description: ID-based cursor from previous response to fetch next page (logs
            with id < cursor)
          title: Cursor
        description: ID-based cursor from previous response to fetch next page (logs
          with id < cursor)
      - name: level
        in: query
        required: false
        schema:
          anyOf:
