  /api/v1/kb/{kb_id}/external_connection/{connection_id}/browse:
    get:
      tags:
      - External Connections
      summary: Browse Storage
      description: "Browse cloud storage to discover sites, drives and folders.\n\n\
        Use this endpoint to help users select a drive and folder path when\ncreating\
        \ a sync configuration.\n\n**SharePoint/OneDrive flow (OAuth):**\n1. Resolve\
        \ site URL: use the `/resolve_site` endpoint with a site URL \u2192 get `site_id`\n\
        2. List drives in a site: provide `site_id` \u2192 returns drives for that\
        \ site\n   - Use `site_id=me` for personal OneDrive (OAuth only)\n3. List\
        \ folders in a drive: provide `drive_id` \u2192 returns folders at root\n\
        4. Navigate folders: provide `drive_id` and `path` \u2192 returns subfolders\n\
        \n**SharePoint flow (certificate auth):**\n1. List sites: no parameters \u2192\
        \ returns all sites (max 50)\n   - Or use `site_search` to search for specific\
        \ sites\n2. List drives in a site: provide `site_id` \u2192 returns drives\
        \ for that site\n3. List folders in a drive: provide `drive_id` \u2192 returns\
        \ folders at root\n4. Navigate folders: provide `drive_id` and `path` \u2192\
        \ returns subfolders\n\n**Google Drive flow:**\n1. List drives: no parameters\
        \ \u2192 returns My Drive and Shared Drives\n2. List folders: provide `drive_id`\
        \ and optionally `path`\n\n**AWS S3 flow:**\n1. List folders: provide `drive_id`\
        \ (bucket name) and optionally `path` (prefix)\n- S3 requires `drive_id` (bucket\
        \ name). Bucket listing is not supported.\n\n**ShareFile flow:**\n1. List\
        \ roots: no parameters \u2192 returns root folders\n2. List folders: provide\
        \ `drive_id` and optionally `path`\n\n**Dropbox flow:**\n1. List root folders:\
        \ no parameters \u2192 returns folders at the Dropbox root\n2. Navigate folders:\
        \ provide `path` (e.g. `/Documents`) \u2192 returns subfolders\n- Dropbox\
        \ does not have drives. Do **not** pass `drive_id`.\n\n**Parameter validation:**\n\
        - `site_search` cannot be combined with `site_id`, `drive_id`, or `path`\n\
        - `site_search` is only supported for certificate auth connections (not OAuth)\n\
        - `site_id` is only valid for SharePoint/Azure connections\n- SharePoint OAuth\
        \ connections require `site_id` to browse (use `/resolve_site` to get it)\n\
        - When `drive_id` is provided, `site_id` is ignored (drive_id is sufficient)"
      operationId: browse_storage_api_v1_kb__kb_id__external_connection__connection_id__browse_get
      parameters:
      - name: kb_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Kb Id
      - name: connection_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Connection Id
      - name: site_search
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Search query for SharePoint sites. Only supported for certificate
            auth connections. For OAuth, use the /resolve_site endpoint instead.
          title: Site Search
        description: Search query for SharePoint sites. Only supported for certificate
          auth connections. For OAuth, use the /resolve_site endpoint instead.
      - name: site_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Microsoft Graph site ID to list drives for. Must be in the
            format 'hostname,site-collection-id,web-id' (e.g. 'contoso.sharepoint.com,<guid>,<guid>').
            Use 'me' for personal OneDrive (OAuth only). Use the /resolve_site endpoint
            to convert a SharePoint URL to a site ID.
          title: Site Id
        description: Microsoft Graph site ID to list drives for. Must be in the format
          'hostname,site-collection-id,web-id' (e.g. 'contoso.sharepoint.com,<guid>,<guid>').
          Use 'me' for personal OneDrive (OAuth only). Use the /resolve_site endpoint
          to convert a SharePoint URL to a site ID.
      - name: drive_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Drive ID to browse folders in.
          title: Drive Id
        description: Drive ID to browse folders in.
      - name: path
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Folder path to list within the drive.
          title: Path
        description: Folder path to list within the drive.
      - name: page_token
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Pagination token
          title: Page Token
        description: Pagination token
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BrowseStorageOutput'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/kb/{kb_id}/external_connection/{connection_id}/resolve_site:
    get:
      tags:
      - External Connections
      summary: Resolve Site
      description: "Resolve a SharePoint site URL to its site ID.\n\nGiven a full\
        \ SharePoint site URL, this endpoint returns the site ID,\nname, and web URL.\
        \ The returned site ID can then be used with the\n`/browse` endpoint to list\
        \ drives for that site.\n\nThis endpoint works with the **Sites.Selected**\
        \ permission scope,\nas long as the specific site has been granted access\
        \ to the application.\n\n**Usage flow:**\n1. Call this endpoint with a site\
        \ URL \u2192 get `site_id`\n2. Call `/browse?site_id={site_id}` \u2192 get\
        \ drives\n3. Call `/browse?drive_id={drive_id}` \u2192 get folders"
      operationId: resolve_site_api_v1_kb__kb_id__external_connection__connection_id__resolve_site_get
      parameters:
      - name: kb_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Kb Id
      - name: connection_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Connection Id
      - name: site_url
        in: query
        required: true
        schema:
          type: string
          description: 'Full SharePoint site URL to resolve. Example: https://contoso.sharepoint.com/sites/TeamSite'
          title: Site Url
        description: 'Full SharePoint site URL to resolve. Example: https://contoso.sharepoint.com/sites/TeamSite'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
