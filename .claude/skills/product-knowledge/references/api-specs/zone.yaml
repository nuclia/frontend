      - name: start_date
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          description: Filter logs with timestamp >= start_date (ISO 8601 format)
          title: Start Date
        description: Filter logs with timestamp >= start_date (ISO 8601 format)
      - name: end_date
        in: query
