      type: object
      required:
      - file_id
      title: ResourceIdentifier
      description: 'Identifier for an external resource.


        The meaning of ``file_id`` depends on the provider (determined by the sync
        config):

        - Google Drive: the Drive file id

        - SharePoint / OneDrive: the item id

        - S3: the object key

        - ShareFile: the item id

        - Dropbox: the full file path including filename (e.g. ``/Documents/report.pdf``)'
    ResourceValidationInput:
      properties:
        credentials:
          additionalProperties: true
          type: object
          title: Credentials
        resources:
          items:
            $ref: '#/components/schemas/ResourceIdentifier'
          type: array
          title: Resources
      type: object
      required:
      - credentials
      - resources
      title: ResourceValidationInput
      description: 'Input schema for validating multiple resources with existing external
        connection.


        Credentials should be encrypted using the same encryption secret used for

        external_connection credential storage.'
    ResourceValidationOutput:
      properties:
        valid_resources:
          items:
            $ref: '#/components/schemas/ResourceIdentifier'
          type: array
          title: Valid Resources
        invalid_resources:
          items:
            $ref: '#/components/schemas/InvalidResource'
          type: array
          title: Invalid Resources
      type: object
      required:
      - valid_resources
      - invalid_resources
      title: ResourceValidationOutput
      description: Output schema for validated resources.
    S3AssumeRoleInfoOutput:
