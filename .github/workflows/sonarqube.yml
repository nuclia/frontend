name: SonarQube Scan Trigger

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  trigger-sonar-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.GHAPP_NUCLIA_SERVICE_BOT_ID }}
          private-key: ${{ secrets.GHAPP_NUCLIA_SERVICE_BOT_PK }}
          owner: nuclia
          repositories: security-workflows

      - name: Dispatch to security-workflows
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          repository: nuclia/security-workflows
          event-type: sonar-scan
          client-payload: >-
            {"repository":"${{ github.repository }}","event":"${{ github.event_name }}","pr_number":${{ github.event.pull_request.number || 0 }},"head_sha":"${{ github.event.pull_request.head.sha || github.sha }}"}
