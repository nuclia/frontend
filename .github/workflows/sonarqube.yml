name: SonarQube Scan Trigger

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
    branches: [main]
  push:
    branches: [main]

jobs:
  trigger-sonar-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Dispatch to security-workflows
        env:
          PR_NUMBER: ${{ github.event.pull_request.number || 0 }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          REPO: ${{ github.repository }}
          EVENT: ${{ github.event_name }}
        run: |
          curl --fail-with-body -sS -X POST \
            -H "Authorization: Bearer ${{ secrets.SECURITY_WORKFLOWS_TRIGGER_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/json" \
            https://api.github.com/repos/nuclia/security-workflows/dispatches \
            -d "$(jq -n \
              --arg repo "$REPO" \
              --arg event "$EVENT" \
              --argjson pr "$PR_NUMBER" \
              --arg sha "$HEAD_SHA" \
              '{event_type:"sonar-scan", client_payload:{repository:$repo, event:$event, pr_number:$pr, head_sha:$sha}}')"
