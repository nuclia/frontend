<nus-user-container>
  <div class="main-container with-gap">
    <div class="form-header">
      <h1>SIGNUP FORM FOR TESTING PURPOSE ONLY</h1>
    </div>
    <form
      data-cy="signup-form"
      class="signup-form"
      method="POST"
      [action]="postUrl">
      <pa-input
        type="email"
        name="email"
        stfLowerCaseInput>
        Email
      </pa-input>
      <pa-input name="fullname">Fullname</pa-input>
      <pa-input
        name="company"
        stfLowerCaseInput>
        Company
      </pa-input>
      <pa-input
        name="workflow"
        value="cowork">
        Workflow ('classic' or 'cowork')
      </pa-input>
      <input
        name="app"
        type="hidden"
        [value]="appUrl" />

      <pa-button
        class="full-width"
        type="submit"
        kind="primary">
        Sign up
      </pa-button>
    </form>

    <p class="centered">
      Already have an account?
      <a
        href="#"
        (click)="login()"
        class="accent-link">
        Login
      </a>
    </p>
  </div>
</nus-user-container>
