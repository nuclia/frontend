<app-account-page-layout
  [title]="((isSubscribed | async) ? 'billing.page-title' : 'billing.subscription.title') | translate"
  [description]="((isSubscribed | async) ? 'billing.page-description' : 'billing.subscription.help') | translate"
  [backLink]="backLink | async"
  panelId="billing-section-panel">
  @if (isTrial | async) {
    <div
      top
      class="trial-status-top">
      <app-account-status></app-account-status>
    </div>
  }
  @if (isSubscribed | async) {
    <pa-tabs
      tabs
      class="settings-tabs">
      <pa-tab
        routerLink="usage"
        routerLinkActive
        #rla3="routerLinkActive"
        [active]="rla3.isActive"
        ariaControls="billing-section-panel">
        {{ 'billing.usage.label' | translate }}
      </pa-tab>
      <pa-tab
        routerLink="checkout"
        routerLinkActive
        #rla1="routerLinkActive"
        [active]="rla1.isActive"
        ariaControls="billing-section-panel">
        {{ 'billing.payment_details' | translate }}
      </pa-tab>
      <pa-tab
        routerLink="my-subscription"
        routerLinkActive
        #rla2="routerLinkActive"
        [active]="rla2.isActive"
        ariaControls="billing-section-panel">
        {{ 'billing.my-subscription' | translate }}
      </pa-tab>
      <pa-tab
        routerLink="history"
        routerLinkActive
        #rla4="routerLinkActive"
        [active]="rla4.isActive"
        ariaControls="billing-section-panel">
        {{ 'billing.history.link' | translate }}
      </pa-tab>
    </pa-tabs>
  }
</app-account-page-layout>
