<app-account-page-layout
  [title]="'account.administration' | translate"
  [description]="'account.administration-description' | translate"
  [backLink]="backLink | async"
  panelId="administration-section-panel">
  <pa-tabs
    tabs
    class="settings-tabs">
    <pa-tab
      routerLink="knowledge-boxes"
      routerLinkActive
      #rla0="routerLinkActive"
      [active]="rla0.isActive"
      ariaControls="administration-section-panel">
      {{ 'account.related_kbs' | translate }}
    </pa-tab>
    @if (isRetrievalAgentsEnabled | async) {
      <pa-tab
        routerLink="retrieval-agents"
        routerLinkActive
        #rla1="routerLinkActive"
        [active]="rla1.isActive"
        ariaControls="administration-section-panel">
        {{ 'navbar.account-retrieval-agents' | translate }}
      </pa-tab>
    }
    @if (isAccountManager | async) {
      <pa-tab
        routerLink="users"
        routerLinkActive
        #rla2="routerLinkActive"
        [active]="rla2.isActive"
        ariaControls="administration-section-panel">
        {{ 'account.manage_users' | translate }}
      </pa-tab>
    }
  </pa-tabs>
</app-account-page-layout>
