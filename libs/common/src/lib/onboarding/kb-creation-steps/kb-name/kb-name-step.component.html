<form
  [formGroup]="form"
  (ngSubmit)="submitForm()">
  <div class="onboarding-form">
    <div class="field">
      <label
        for="kbName"
        class="title-s">
        {{ (inRaoApp ? 'onboarding.step2.rao-name' : 'onboarding.step2.kb-name') | translate }}
      </label>
      <pa-input
        id="kbName"
        formControlName="kbName"
        help="validation.required"
        externalLabel></pa-input>
    </div>
    @if (!inRaoApp && (coworkAccountEnabled | async)) {
      <div class="field">
        <label
          for="workflow"
          class="title-s">
          {{ 'onboarding.step2.mode' | translate }}
        </label>
        <div>
          @if (translationsReady | async) {
            <pa-radio-group
              id="workflow"
              formControlName="workflow">
              <pa-radio value="classic">{{ 'onboarding.step2.mode-classic' | translate }}</pa-radio>
              <pa-radio value="cowork">{{ 'onboarding.step2.mode-cowork' | translate }}</pa-radio>
            </pa-radio-group>
          }
        </div>
      </div>
    }
  </div>
  <nsi-sticky-footer>
    <pa-button
      type="submit"
      kind="primary"
      [disabled]="form.invalid">
      {{ 'onboarding.next-button' | translate }}
    </pa-button>
  </nsi-sticky-footer>
</form>
