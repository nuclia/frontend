<div class="key-value-field">
  @if (title()) {
    <div class="title-s">{{ title() }}</div>
  }
  @if (data() && (data() | keyvalue)?.length) {
    <pa-table columns="50% 50%">
      @for (item of data() | keyvalue; track item.key) {
        <pa-table-row>
          <pa-table-cell>{{ item.key }}</pa-table-cell>
          <pa-table-cell>{{ formatValue(item.key, item.value) }}</pa-table-cell>
        </pa-table-row>
      }
    </pa-table>
  } @else {
    <p>–</p>
  }
</div>
