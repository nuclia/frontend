<app-activity-log-page
  pageTitle="activity.cost-token.title"
  pageSubtitle="activity.cost-token.subtitle"
  [columns]="columns"
  [sidebarFields]="sidebarFields"
  [items]="service.items()"
  [loading]="service.loading()"
  [loadingMore]="service.loadingMore()"
  [availableMonths]="service.availableMonths()"
  (monthRangeChange)="onMonthRangeChange($event)"
  (searchChange)="onSearchChange($event)"
  (loadNextPage)="onLoadNextPage()"
  (downloadRequested)="onDownloadRequested($event)">

  <!-- Stat cards -->
  <div stat-cards class="stat-cards">
    <div class="stat-card">
      <div class="title-xxs">{{ 'activity.cost-token.total-tokens' | translate }}</div>
      <div class="display-s">{{ service.stats().totalTokens | number }}</div>
    </div>
  </div>

</app-activity-log-page>
