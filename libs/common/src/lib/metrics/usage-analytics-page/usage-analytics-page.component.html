<app-metrics-page
  pageTitle="activity.usage-analysis.title"
  pageSubtitle="activity.usage-analysis.subtitle"
  [columns]="columns"
  [sidebarFields]="sidebarFields"
  [items]="service.items()"
  [loading]="service.loading()"
  [loadingMore]="service.loadingMore()"
  [emptyStateTitleKey]="emptyStateTitleKey()"
  [emptyStateDescriptionKey]="emptyStateDescriptionKey()"
  [emptyStateActionLabelKey]="emptyStateActionLabelKey()"
  [showEmptyStateAction]="showEmptyStateAction()"
  [availableMonths]="service.availableMonths()"
  [remiDiagnosisResolver]="resolveRemiDiagnosis"
  [showDownload]="false"
  [showSearch]="false"
  (monthRangeChange)="onMonthRangeChange($event)"
  (loadNextPage)="onLoadNextPage()"
  (emptyStateActionTriggered)="resetFiltersFromEmptyState()"
  (rowActionTriggered)="openAdvice($event)">
  <!-- Filter button + download button in toolbar (projected into toolbar-extra slot) -->
  <ng-container toolbar-extra>
    <app-metrics-filters
      [showSyntheticStatus]="true"
      [syntheticStatuses]="syntheticStatuses"
      [syntheticStatusLabels]="syntheticStatusLabelsMap"
      [activeSyntheticStatuses]="service.activeStatuses()"
      [syntheticStatusDisabled]="syntheticStatusDisabled()"
      [filterColumns]="filterColumns"
      [activeBooleanConditions]="activeBooleanConditions()"
      [activeNumericConditions]="activeNumericConditions()"
      [selectedMonth]="selectedMonth()"
      [activeDateConditions]="activeDateConditions()"
      (filtersApplied)="onFiltersApplied($event)"></app-metrics-filters>

    <pa-button
      class="download-button"
      icon="download"
      aspect="basic"
      [iconAndText]="true"
      [paTooltip]="'activity.usage-analysis.download-tooltip' | translate: { period: formattedSelectedMonth() }"
      (click)="downloadLogs()">
      {{ 'activity.download' | translate }}
    </pa-button>
  </ng-container>

  <!-- Stat cards -->
  <div
    stat-cards
    class="stat-cards">
    <div class="stat-card">
      <div class="title-xxs">{{ 'activity.usage-analysis.avg-answer-relevance' | translate }}</div>
      <div class="display-s remi-summary">
        <app-remi-score-display
          class="remi-summary-score"
          [value]="service.remiScoreAverages().answerRelevance"
          displayMode="compact"></app-remi-score-display>
        <app-remi-score-display
          class="remi-summary-badge"
          [value]="service.remiScoreAverages().answerRelevance"
          displayMode="badge"></app-remi-score-display>
      </div>
    </div>
    <div class="stat-card">
      <div class="title-xxs">{{ 'activity.usage-analysis.avg-context-relevance' | translate }}</div>
      <div class="display-s remi-summary">
        <app-remi-score-display
          class="remi-summary-score"
          [value]="service.remiScoreAverages().contextRelevance"
          displayMode="compact"></app-remi-score-display>
        <app-remi-score-display
          class="remi-summary-badge"
          [value]="service.remiScoreAverages().contextRelevance"
          displayMode="badge"></app-remi-score-display>
      </div>
    </div>
    <div class="stat-card">
      <div class="title-xxs">{{ 'activity.usage-analysis.avg-groundedness' | translate }}</div>
      <div class="display-s remi-summary">
        <app-remi-score-display
          class="remi-summary-score"
          [value]="service.remiScoreAverages().groundedness"
          displayMode="compact"></app-remi-score-display>
        <app-remi-score-display
          class="remi-summary-badge"
          [value]="service.remiScoreAverages().groundedness"
          displayMode="badge"></app-remi-score-display>
      </div>
    </div>
  </div>
</app-metrics-page>
