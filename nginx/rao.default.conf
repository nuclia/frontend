server {
  listen 80;
  server_name stashify-rao;
  root /dist/;
  index index.html;
  location / {
      add_header Strict-Transport-Security "max-age=31536000" always;
      add_header Cross-Origin-Opener-Policy "same-origin" always;
      add_header X-Frame-Options "SAMEORIGIN" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header X-XSS-Protection "0" always;
      add_header Content-Security-Policy "script-src 'self' https://cdn.stashify.cloud https://rag.stashify.cloud https://cdn.rag.progress.cloud https://www.googletagmanager.com https://cdn.cookielaw.org" always;

      try_files $uri /index.html =404;
  }
  error_page   500 502 503 504  /50x.html;
  location = /50x.html {
      root   /usr/share/nginx/html;
  }
}
