server {
  listen 80;
  server_name stashify-platform;
  root /dist/;
  index index.html;
  location / {
      add_header Strict-Transport-Security "max-age=31536000" always;
      add_header Cross-Origin-Opener-Policy "same-origin" always;
      add_header X-Frame-Options "SAMEORIGIN" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header X-XSS-Protection "0" always;
      # 'unsafe-eval' is required by Google Tag Manager (evaluates custom HTML tag scripts)
      # and PostHog (uses Function() constructor for feature flag evaluation).
      # Removing it breaks GTM custom tags and PostHog feature flags entirely.
      # HubSpot tracking (*.hs-scripts.com, *.hubspot.com) is injected by GTM on subscription pages.
      # Stripe: js.stripe.com loads Stripe.js; *.stripe.network is Stripe's CDN used by Stripe Elements iframes.
      add_header Content-Security-Policy "script-src 'self' 'unsafe-eval' 'sha256-CjFUxFmO8p+HqFTns+8kQJLtkFAEvIT/H4AOPmt0dw0=' 'sha256-wdPP01MJcGxiUEJUlrtOEF4titIQry4e/Ol4mZvly0M=' https://cdn.stashify.cloud https://rag.stashify.cloud https://cdn.rag.progress.cloud https://www.googletagmanager.com https://cdn.cookielaw.org https://*.posthog.com https://*.i.posthog.com https://*.hs-scripts.com https://*.hubspot.com https://js.stripe.com https://*.stripe.network" always;

      try_files $uri /index.html =404;
  }
  error_page   500 502 503 504  /50x.html;
  location = /50x.html {
      root   /usr/share/nginx/html;
  }
}
