server {
  listen 80;
  server_name stashify-app;
  root /dist/;
  index index.html;
  location / {
      add_header Strict-Transport-Security "max-age=31536000" always;
      add_header Cross-Origin-Opener-Policy "same-origin" always;
      add_header X-Frame-Options "SAMEORIGIN" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header X-XSS-Protection "0" always;
      # Inline script hashes (dashboard / nuclia.cloud):
      #   sha256-CjFUx... = GTM loader IIFE
      #   sha256-Gp7vl... = OptanonWrapper noop
      # HubSpot tracking (*.hs-scripts.com, *.hubspot.com) is injected by GTM on subscription pages.
      # Stripe: js.stripe.com loads Stripe.js; *.stripe.network is Stripe's CDN used by Stripe Elements iframes.
      add_header Content-Security-Policy-Report-Only "script-src 'self' 'sha256-CjFUxFmO8p+HqFTns+8kQJLtkFAEvIT/H4AOPmt0dw0=' 'sha256-Gp7vlxkp0urWKp+QoSObkhRevYYmLSzP7zYphDkoBrk=' https://cdn.stashify.cloud https://rag.stashify.cloud https://cdn.rag.progress.cloud https://gcp-global-dev-1.nuclia.io https://cdn.gcp-global-dev-1.nuclia.io https://www.googletagmanager.com https://cdn.cookielaw.org https://cdnjs.cloudflare.com https://*.posthog.com https://*.i.posthog.com https://*.hs-scripts.com https://*.hubspot.com https://js.stripe.com https://*.stripe.network https://cdn.insight.sitefinity.com https://snap.licdn.com https://px.ads.linkedin.com https://img.en25.com https://d6vtbcy3ong79.cloudfront.net https://connect.facebook.net https://www.redditstatic.com https://www.clarity.ms https://bat.bing.com https://static.ads-twitter.com; report-uri /api/csp-reports/csp; report-to csp" always;
      add_header Reporting-Endpoints "csp=\"/api/csp-reports/reporting-api/csp\"" always;

      try_files $uri /index.html =404;
  }
  error_page   500 502 503 504  /50x.html;
  location = /50x.html {
      root   /usr/share/nginx/html;
  }
}
